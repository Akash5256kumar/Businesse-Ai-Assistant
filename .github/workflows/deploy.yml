name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up SSH ─────────────────────────────────────────────────────
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # ── 3. Deploy ─────────────────────────────────────────────────────────
      - name: Deploy to server
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh $USER@$HOST << 'EOF'
            set -e

            echo "==> Pulling latest code..."
            cd /root/Businesse-Ai-Assistant
            git pull origin main

            echo "==> Installing dependencies..."
            poetry install --no-root --only main

            echo "==> Running database migrations..."
            poetry run alembic upgrade head

            echo "==> Restarting service..."
            systemctl restart apna-backend.service

            echo "==> Checking service status..."
            systemctl is-active apna-backend.service && echo "Service is running ✓"

            echo "==> Deploy complete!"
          EOF

      # ── 4. Health check ───────────────────────────────────────────────────
      - name: Health check
        env:
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          sleep 5
          curl --fail --silent --max-time 10 http://$HOST/health || \
          curl --fail --silent --max-time 10 http://$HOST/api/v1/health || \
          echo "Warning: health check endpoint not found (add one for better monitoring)"
